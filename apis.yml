aid: bird-com
url: https://raw.githubusercontent.com/api-evangelist/bird-com/refs/heads/main/apis.yml
name: Bird
kind: company
description: Bird (formerly MessageBird) is an omnichannel CRM for marketing, service,
  and payments. Its REST APIs at https://api.bird.com let businesses send and receive
  messages across SMS, WhatsApp, email, and voice through a unified Channels and
  Conversations interface, manage contacts and phone numbers, and migrate from the
  legacy MessageBird REST API at https://rest.messagebird.com.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- CRM
- Messaging
- SMS
- WhatsApp
- Email
- Voice
- Omnichannel
- CPaaS
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
